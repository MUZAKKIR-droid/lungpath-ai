<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LungPath AI | Medical Diagnostic System</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom Styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-logo">
        <i class="fa-solid fa-lungs"></i> LungPath <span>AI</span>
      </a>
      <div class="nav-links">
        <a href="/">Dashboard</a>
        <a href="/doctors">Find Doctors</a>
        <a href="/info">Knowledge Base</a>
        <a href="/faq">FAQ</a>
      </div>
      <div class="mobile-menu-icon"><i class="fa-solid fa-bars"></i></div>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}
    {% endblock %}
  </main>

  <footer class="footer">
    <div class="footer-container">
      <p>&copy; 2024 LungPath AI Diagnostic. For educational purposes only.</p>
      <div class="footer-links">
        <a href="/about">About</a>
        <a href="/help">Help Center</a>
      </div>
    </div>
  </footer>

  {% block scripts %}
  {% endblock %}
</body>
</html>
